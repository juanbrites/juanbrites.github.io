<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datarista — Em Breve</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1e2530;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', system-ui, sans-serif;
}

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  padding: 40px;
  text-align: center;
}

.logo {
  width: 280px;
  max-width: 80vw;
  opacity: 0;
  animation: fadeUp .8s ease .1s forwards;
}

.slogan {
  font-size: 15px;
  font-weight: 400;
  color: #6a8090;
  letter-spacing: .06em;
  opacity: 0;
  animation: fadeUp .8s ease .3s forwards;
}

.badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #00b4d8;
  border: 1px solid rgba(0, 180, 216, .25);
  background: rgba(0, 180, 216, .07);
  padding: 7px 20px;
  border-radius: 20px;
  opacity: 0;
  animation: fadeUp .8s ease .5s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}
</style>
</head>
<body>
  <div class="center">
    <img src="logo.png" alt="Datarista" class="logo">
    <p class="slogan">Feito com cuidado para quem cuida dos dados.</p>
    <span class="badge">Em Breve</span>
  </div>
</body>
</html>
